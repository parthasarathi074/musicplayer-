<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testimonials — 3D Carousel</title>
  <meta name="description" content="A stunning 3D animated testimonials carousel with stacked cards. Smooth transitions and beautiful hover effects." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c12;
      --surface:   #14171f;
      --card:      #1a1e2a;
      --border:    rgba(255,255,255,.08);
      --accent:    #7c5cfc;
      --accent-2:  #c966e8;
      --accent-3:  #5b8dff;
      --text:      #f0eef6;
      --text-dim:  #8a8b9e;
      --shadow:    rgba(0,0,0,.55);
      --glow:      rgba(124,92,252,.35);
    }

    html { font-size: 16px; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ─── Ambient Background Blobs ─── */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(140px);
      opacity: .3;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 650px; height: 650px;
      background: var(--accent);
      top: -200px; left: -150px;
      animation: blobDrift 20s ease-in-out infinite alternate;
    }
    body::after {
      width: 550px; height: 550px;
      background: var(--accent-2);
      bottom: -160px; right: -120px;
      animation: blobDrift 24s ease-in-out infinite alternate-reverse;
    }
    @keyframes blobDrift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(60px, 40px) scale(1.15); }
      100% { transform: translate(-40px, 20px) scale(.92); }
    }

    /* Extra accent blob */
    .bg-blob {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: var(--accent-3);
      filter: blur(160px);
      opacity: .15;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: blobPulse 12s ease-in-out infinite;
    }
    @keyframes blobPulse {
      0%, 100% { opacity: .1; transform: translate(-50%, -50%) scale(1); }
      50%      { opacity: .2; transform: translate(-50%, -50%) scale(1.2); }
    }

    /* ─── Main Container ─── */
    .testimonials-wrapper {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 3.5rem;
      align-items: center;
      max-width: 920px;
      width: 92%;
      padding: 2rem;
    }

    /* ─── Section Header (spans both columns) ─── */
    .section-header {
      grid-column: 1 / -1;
      text-align: center;
      margin-bottom: .5rem;
    }
    .section-header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, var(--accent), var(--accent-2), var(--accent-3));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 6s ease infinite;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    .section-header p {
      color: var(--text-dim);
      font-size: .95rem;
      margin-top: .5rem;
    }

    /* ─── Card Stack (Left Column) ─── */
    .card-stack {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 3.8;
      perspective: 1200px;
      perspective-origin: 50% 50%;
    }

    .card {
      position: absolute;
      inset: 8%;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transform-style: preserve-3d;
      will-change: transform, opacity, filter;
      backface-visibility: hidden;
      transition:
        transform 1s cubic-bezier(.22,1,.36,1),
        opacity   .7s cubic-bezier(.22,1,.36,1),
        filter    .7s cubic-bezier(.22,1,.36,1),
        box-shadow .7s cubic-bezier(.22,1,.36,1);
    }

    .card img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      border-radius: 20px;
    }

    /* Shiny gloss overlay on image */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,.18) 0%,
        rgba(255,255,255,0) 40%,
        rgba(0,0,0,.15) 100%
      );
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity .6s ease;
    }
    .card.active::before { opacity: 1; }

    /* Animated light sweep on active card */
    .card .shimmer {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      z-index: 3;
      pointer-events: none;
      background: linear-gradient(
        105deg,
        transparent 40%,
        rgba(255,255,255,.12) 45%,
        rgba(255,255,255,.06) 50%,
        transparent 55%
      );
      background-size: 250% 100%;
      opacity: 0;
      transition: opacity .5s ease;
    }
    .card.active .shimmer {
      opacity: 1;
      animation: shimmerSweep 3s ease-in-out infinite;
    }
    @keyframes shimmerSweep {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Glow border ring for active card */
    .card::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      padding: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2), var(--accent-3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity .6s ease;
      z-index: 4;
      pointer-events: none;
    }
    .card.active::after { opacity: .8; }

    /* White border on stacked cards for visibility */
    .card .card-border {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      border: 3px solid rgba(255,255,255,.15);
      z-index: 5;
      pointer-events: none;
      transition: border-color .5s ease;
    }
    .card.active .card-border {
      border-color: transparent;
    }

    /* ─── Text Panel (Right Column) ─── */
    .text-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.5rem;
      min-height: 300px;
    }

    .text-content {
      opacity: 0;
      transform: translateY(28px);
      transition:
        opacity .55s cubic-bezier(.22,1,.36,1),
        transform .55s cubic-bezier(.22,1,.36,1);
    }
    .text-content.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .text-content .quote-icon {
      display: block;
      width: 40px;
      height: 40px;
      margin-bottom: .75rem;
      fill: url(#quoteGrad);
      opacity: .7;
    }

    .text-content .description {
      font-size: 1.1rem;
      line-height: 1.75;
      color: var(--text);
      font-weight: 400;
      margin-bottom: 1.5rem;
      position: relative;
    }

    /* Star rating */
    .stars {
      display: flex;
      gap: 3px;
      margin-bottom: 1rem;
    }
    .stars svg {
      width: 18px;
      height: 18px;
      fill: #fbbf24;
      filter: drop-shadow(0 0 3px rgba(251,191,36,.3));
    }

    .text-content .author {
      display: flex;
      align-items: center;
      gap: .85rem;
    }
    .text-content .author-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
      box-shadow: 0 0 12px rgba(124,92,252,.25);
    }
    .text-content .author-info .name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .text-content .author-info .role {
      font-size: .8rem;
      color: var(--text-dim);
      margin-top: 1px;
    }

    /* ─── Counter ─── */
    .counter {
      font-family: 'Inter', monospace;
      font-size: .85rem;
      color: var(--text-dim);
      letter-spacing: .08em;
    }
    .counter .current {
      color: var(--accent);
      font-weight: 700;
      font-size: 1.05rem;
    }

    /* ─── Navigation ─── */
    .nav-row {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(20,23,31,.8);
      backdrop-filter: blur(8px);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .3s ease;
      position: relative;
      overflow: hidden;
    }
    .nav-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      opacity: 0;
      transition: opacity .3s ease;
      z-index: 0;
    }
    .nav-btn svg { position: relative; z-index: 1; width: 18px; height: 18px; }
    .nav-btn:hover:not(:disabled)::before { opacity: 1; }
    .nav-btn:hover:not(:disabled) {
      transform: scale(1.1);
      border-color: transparent;
      box-shadow: 0 0 24px var(--glow);
    }
    .nav-btn:active:not(:disabled) { transform: scale(.94); }
    .nav-btn:disabled {
      opacity: .25;
      cursor: not-allowed;
    }

    /* Progress dots */
    .dots {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      transition: all .45s cubic-bezier(.22,1,.36,1);
      cursor: pointer;
    }
    .dot:hover { background: rgba(255,255,255,.2); }
    .dot.active {
      width: 30px;
      border-radius: 4px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 12px rgba(124,92,252,.3);
    }

    /* ─── Hover tilt on active card ─── */
    .card.active { cursor: default; }

    /* ─── Responsive ─── */
    @media (max-width: 720px) {
      .testimonials-wrapper {
        grid-template-columns: 1fr;
        gap: 2rem;
        padding: 1.5rem;
      }
      .card-stack {
        max-width: 340px;
        margin: 0 auto;
      }
      .section-header h1 { font-size: 1.7rem; }
    }

    /* ─── Entry animation ─── */
    .testimonials-wrapper {
      animation: fadeUp .9s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(50px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>

<div class="bg-blob"></div>

<div class="testimonials-wrapper" id="testimonials">
  <!-- Header -->
  <div class="section-header">
    <h1>What People Say</h1>
    <p>Hear from our community of happy users</p>
  </div>

  <!-- Card Stack -->
  <div class="card-stack" id="cardStack">
    <!-- Cards injected by JS -->
  </div>

  <!-- Text Panel -->
  <div class="text-panel" id="textPanel">
    <div class="text-content" id="textContent">
      <!-- Quote icon with gradient -->
      <svg width="0" height="0" style="position:absolute">
        <defs>
          <linearGradient id="quoteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="var(--accent)" />
            <stop offset="100%" stop-color="var(--accent-2)" />
          </linearGradient>
        </defs>
      </svg>
      <svg class="quote-icon" viewBox="0 0 24 24"><path d="M4.583 17.321C3.553 16.227 3 15 3 13.011c0-3.5 2.457-6.637 6.03-8.188l.893 1.378c-3.335 1.804-3.987 4.145-4.247 5.621.537-.278 1.24-.375 1.929-.311 1.804.167 3.226 1.648 3.226 3.489a3.5 3.5 0 01-3.5 3.5c-1.073 0-2.099-.49-2.748-1.179zm10 0C13.553 16.227 13 15 13 13.011c0-3.5 2.457-6.637 6.03-8.188l.893 1.378c-3.335 1.804-3.987 4.145-4.247 5.621.537-.278 1.24-.375 1.929-.311 1.804.167 3.226 1.648 3.226 3.489a3.5 3.5 0 01-3.5 3.5c-1.073 0-2.099-.49-2.748-1.179z"/></svg>

      <div class="stars" id="stars"></div>
      <p class="description" id="descText"></p>
      <div class="author">
        <img class="author-avatar" id="authorAvatar" src="" alt="" />
        <div class="author-info">
          <div class="name" id="authorName"></div>
          <div class="role" id="authorRole"></div>
        </div>
      </div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" aria-label="Previous testimonial">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="nav-btn" id="nextBtn" aria-label="Next testimonial">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
      </button>
      <span class="counter"><span class="current" id="counterCurrent">01</span> / <span id="counterTotal">04</span></span>
      <div class="dots" id="dots"></div>
    </div>
  </div>
</div>

<script>
(() => {
  /* ─── Data ─── */
  const items = [
    {
      id: 1,
      name: "John Doe",
      role: "Product Designer",
      rating: 5,
      description: "This product completely changed how I approach my work. The attention to detail and user experience is absolutely phenomenal — highly recommended!",
      image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=520&fit=crop&crop=face",
      avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&h=80&fit=crop&crop=face",
    },
    {
      id: 2,
      name: "Jane Smith",
      role: "Engineering Lead",
      rating: 5,
      description: "An amazing experience from start to finish. The seamless integration and intuitive design made adoption effortless across my entire team.",
      image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&h=520&fit=crop&crop=face",
      avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&h=80&fit=crop&crop=face",
    },
    {
      id: 3,
      name: "Mike Johnson",
      role: "Startup Founder",
      rating: 5,
      description: "Outstanding service and quality that exceeded every expectation. It's rare to find a tool that genuinely delivers on its promises — this one does.",
      image: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400&h=520&fit=crop&crop=face",
      avatar: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=80&h=80&fit=crop&crop=face",
    },
    {
      id: 4,
      name: "Sarah Williams",
      role: "Creative Director",
      rating: 5,
      description: "The level of polish and thoughtfulness is unmatched. Every interaction feels crafted with care — it transformed our entire creative workflow.",
      image: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&h=520&fit=crop&crop=face",
      avatar: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=80&h=80&fit=crop&crop=face",
    },
  ];

  let activeIndex = 0;
  let direction = 1;
  let isAnimating = false;

  const stackEl    = document.getElementById('cardStack');
  const textEl     = document.getElementById('textContent');
  const descText   = document.getElementById('descText');
  const starsEl    = document.getElementById('stars');
  const authorName = document.getElementById('authorName');
  const authorRole = document.getElementById('authorRole');
  const authorAvt  = document.getElementById('authorAvatar');
  const prevBtn    = document.getElementById('prevBtn');
  const nextBtn    = document.getElementById('nextBtn');
  const counterCur = document.getElementById('counterCurrent');
  const counterTot = document.getElementById('counterTotal');
  const dotsEl     = document.getElementById('dots');

  counterTot.textContent = String(items.length).padStart(2, '0');

  /* ─── Seed rotation offsets per card ─── */
  const rotations = [5, -4, 7, -6];

  /* ─── Star SVG ─── */
  const starSVG = `<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;

  /* ─── Build DOM Cards ─── */
  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    card.innerHTML = `
      <img src="${item.image}" alt="${item.name}" draggable="false" />
      <div class="shimmer"></div>
      <div class="card-border"></div>
    `;
    stackEl.appendChild(card);
  });

  /* ─── Build Dots ─── */
  items.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(dot);
  });

  /* ─────────────────────────────────────────────
     POSITION CARDS  — the "stacked" look
     Cards fan out behind the active one with
     exaggerated offsets so they are clearly visible.
  ───────────────────────────────────────────── */
  function positionCards(animate = true) {
    const cards = stackEl.querySelectorAll('.card');

    cards.forEach((card, i) => {
      const offset = i - activeIndex;
      const absOff = Math.abs(offset);
      const isActive = offset === 0;

      card.classList.toggle('active', isActive);
      if (!animate) card.style.transition = 'none';

      if (isActive) {
        card.style.transform = `
          translateX(0px)
          translateY(0px)
          translateZ(80px)
          rotateZ(0deg)
          rotateY(0deg)
          scale(1)
        `;
        card.style.opacity = '1';
        card.style.filter = 'brightness(1) saturate(1.05)';
        card.style.zIndex = 100;
        card.style.boxShadow = '0 30px 70px rgba(0,0,0,.5), 0 0 40px var(--glow)';
      } else {
        /* Fan cards out: next cards go right+down, prev cards go left+down */
        const sign = offset > 0 ? 1 : -1;
        const rot = rotations[(i + items.length) % rotations.length];
        const tx = offset * 35;                            // wider horizontal spread
        const ty = absOff * 12;                            // slight vertical cascade
        const tz = -100 * absOff;                          // push back in Z
        const sc = Math.max(0.72, 1 - absOff * 0.08);     // shrink more
        const op = Math.max(0.15, 1 - absOff * 0.25);     // keep more visible

        card.style.transform = `
          translateX(${tx}px)
          translateY(${ty}px)
          translateZ(${tz}px)
          rotateZ(${rot}deg)
          rotateY(${sign * -6}deg)
          scale(${sc})
        `;
        card.style.opacity = String(op);
        card.style.filter = `brightness(${Math.max(0.45, 1 - absOff * 0.18)}) saturate(0.7)`;
        card.style.zIndex = 50 - absOff;
        card.style.boxShadow = `0 ${8 + absOff * 6}px ${25 + absOff * 12}px rgba(0,0,0,.4)`;
      }

      if (!animate) {
        card.offsetHeight; // force reflow
        requestAnimationFrame(() => { card.style.transition = ''; });
      }
    });
  }

  /* ─────────────────────────────────────────────
     ANIMATE ACTIVE ENTRY — dramatic swoop-in
     The active card flies in from the side with
     rotation and bounces into place.
  ───────────────────────────────────────────── */
  function animateActiveEntry() {
    const cards = stackEl.querySelectorAll('.card');
    const active = cards[activeIndex];
    if (!active) return;

    const startX = direction === 1 ? -220 : 220;

    active.style.transition = 'none';
    active.style.transform = `
      translateX(${startX}px)
      translateY(30px)
      translateZ(-120px)
      rotateZ(${direction * -15}deg)
      rotateY(${direction * 20}deg)
      scale(0.75)
    `;
    active.style.opacity = '0.2';
    active.style.filter = 'brightness(0.5) saturate(0.5)';

    active.offsetHeight; // force reflow

    active.style.transition = `
      transform 1s cubic-bezier(.22,1,.36,1),
      opacity .65s cubic-bezier(.22,1,.36,1),
      filter .65s ease,
      box-shadow .65s ease
    `;

    requestAnimationFrame(() => {
      active.style.transform = `
        translateX(0px)
        translateY(0px)
        translateZ(80px)
        rotateZ(0deg)
        rotateY(0deg)
        scale(1)
      `;
      active.style.opacity = '1';
      active.style.filter = 'brightness(1) saturate(1.05)';
      active.style.boxShadow = '0 30px 70px rgba(0,0,0,.5), 0 0 40px var(--glow)';
    });
  }

  /* ─── Animate exiting card out ─── */
  function animateExitingCard(exitIndex) {
    const cards = stackEl.querySelectorAll('.card');
    const exiting = cards[exitIndex];
    if (!exiting) return;

    const exitX = direction === 1 ? 200 : -200;

    exiting.style.transition = `
      transform .6s cubic-bezier(.55,.055,.675,.19),
      opacity .4s ease,
      filter .4s ease
    `;
    exiting.style.transform = `
      translateX(${exitX}px)
      translateY(-20px)
      translateZ(120px)
      rotateZ(${direction * 12}deg)
      rotateY(${direction * -15}deg)
      scale(0.85)
    `;
    exiting.style.opacity = '0';
    exiting.style.filter = 'brightness(1.3) saturate(0.5)';
    exiting.style.zIndex = 200; // temporarily on top while exiting

    // After exit animation, snap to correct stack position
    setTimeout(() => {
      const offset = exitIndex - activeIndex;
      const absOff = Math.abs(offset);
      const sign = offset > 0 ? 1 : -1;
      const rot = rotations[(exitIndex + items.length) % rotations.length];

      exiting.style.transition = 'none';
      exiting.style.transform = `
        translateX(${offset * 35}px)
        translateY(${absOff * 12}px)
        translateZ(${-100 * absOff}px)
        rotateZ(${rot}deg)
        rotateY(${sign * -6}deg)
        scale(${Math.max(0.72, 1 - absOff * 0.08)})
      `;

      exiting.offsetHeight;

      requestAnimationFrame(() => {
        exiting.style.transition = `
          transform 1s cubic-bezier(.22,1,.36,1),
          opacity .7s cubic-bezier(.22,1,.36,1),
          filter .7s ease,
          box-shadow .7s ease
        `;
        exiting.style.opacity = String(Math.max(0.15, 1 - absOff * 0.25));
        exiting.style.filter = `brightness(${Math.max(0.45, 1 - absOff * 0.18)}) saturate(0.7)`;
        exiting.style.zIndex = 50 - absOff;
        exiting.style.boxShadow = `0 ${8 + absOff * 6}px ${25 + absOff * 12}px rgba(0,0,0,.4)`;
      });
    }, 550);
  }

  /* ─── Update Text ─── */
  function updateText() {
    const item = items[activeIndex];
    textEl.classList.remove('visible');

    setTimeout(() => {
      // Stars
      starsEl.innerHTML = starSVG.repeat(item.rating);

      descText.textContent = item.description;
      authorName.textContent = item.name;
      authorRole.textContent = item.role;
      authorAvt.src = item.avatar;
      authorAvt.alt = item.name;
      counterCur.textContent = String(activeIndex + 1).padStart(2, '0');

      // Dots
      dotsEl.querySelectorAll('.dot').forEach((d, i) =>
        d.classList.toggle('active', i === activeIndex)
      );

      requestAnimationFrame(() => textEl.classList.add('visible'));
    }, 280);
  }

  /* ─── Navigation ─── */
  function goTo(index) {
    if (isAnimating || index === activeIndex || index < 0 || index >= items.length) return;
    isAnimating = true;

    const prevIndex = activeIndex;
    direction = index > activeIndex ? 1 : -1;
    activeIndex = index;

    // 1) animate old card out
    animateExitingCard(prevIndex);

    // 2) position all other (non-exiting, non-entering) cards
    const cards = stackEl.querySelectorAll('.card');
    cards.forEach((card, i) => {
      if (i === prevIndex || i === activeIndex) return;
      const offset = i - activeIndex;
      const absOff = Math.abs(offset);
      const sign = offset > 0 ? 1 : -1;
      const rot = rotations[(i + items.length) % rotations.length];

      card.classList.remove('active');
      card.style.transform = `
        translateX(${offset * 35}px)
        translateY(${absOff * 12}px)
        translateZ(${-100 * absOff}px)
        rotateZ(${rot}deg)
        rotateY(${sign * -6}deg)
        scale(${Math.max(0.72, 1 - absOff * 0.08)})
      `;
      card.style.opacity = String(Math.max(0.15, 1 - absOff * 0.25));
      card.style.filter = `brightness(${Math.max(0.45, 1 - absOff * 0.18)}) saturate(0.7)`;
      card.style.zIndex = 50 - absOff;
    });

    // 3) animate new active card in (slight delay for drama)
    setTimeout(() => {
      cards[activeIndex].classList.add('active');
      animateActiveEntry();
    }, 120);

    updateText();
    updateButtons();

    setTimeout(() => { isAnimating = false; }, 1100);
  }

  function next() { if (activeIndex < items.length - 1) goTo(activeIndex + 1); }
  function prev() { if (activeIndex > 0) goTo(activeIndex - 1); }

  function updateButtons() {
    prevBtn.disabled = activeIndex === 0;
    nextBtn.disabled = activeIndex === items.length - 1;
  }

  prevBtn.addEventListener('click', prev);
  nextBtn.addEventListener('click', next);

  /* Keyboard nav */
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prev();
  });

  /* ─── Hover tilt on active card ─── */
  stackEl.addEventListener('mousemove', (e) => {
    const active = stackEl.querySelector('.card.active');
    if (!active || isAnimating) return;
    const rect = active.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) / (rect.width / 2);
    const dy = (e.clientY - cy) / (rect.height / 2);

    active.style.transition = 'transform .12s ease-out, opacity .6s ease, filter .6s ease, box-shadow .6s ease';
    active.style.transform = `
      translateX(${dx * 6}px) translateY(${dy * 4}px) translateZ(80px)
      rotateY(${dx * 10}deg) rotateX(${-dy * 8}deg) rotateZ(0deg)
      scale(1.03)
    `;
    active.style.boxShadow = `
      ${-dx * 15}px ${-dy * 10 + 30}px 70px rgba(0,0,0,.5),
      0 0 50px var(--glow)
    `;
  });

  stackEl.addEventListener('mouseleave', () => {
    const active = stackEl.querySelector('.card.active');
    if (!active || isAnimating) return;
    active.style.transition = 'transform .6s cubic-bezier(.22,1,.36,1), opacity .6s ease, filter .6s ease, box-shadow .6s ease';
    active.style.transform = `
      translateX(0px) translateY(0px) translateZ(80px)
      rotateZ(0deg) rotateY(0deg) scale(1)
    `;
    active.style.boxShadow = '0 30px 70px rgba(0,0,0,.5), 0 0 40px var(--glow)';
  });

  /* ─── Click on stacked card to navigate ─── */
  stackEl.addEventListener('click', (e) => {
    const card = e.target.closest('.card');
    if (!card) return;
    const idx = parseInt(card.dataset.index);
    if (idx !== activeIndex) goTo(idx);
  });

  /* ─── Touch swipe ─── */
  let touchStartX = 0;
  stackEl.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
  stackEl.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) {
      if (dx < 0) next(); else prev();
    }
  }, { passive: true });

  /* ─── Init ─── */
  positionCards(false);
  updateText();
  updateButtons();

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      textEl.classList.add('visible');
    });
  });
})();
</script>

</body>
</html>
